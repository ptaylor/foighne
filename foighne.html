function createCardElement(card, index) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.cardIndex = index;
  
  if (!card.faceUp) {
    div.classList.add('face-down');
    return div;
  }
  
  div.classList.add('face-up');
  div.classList.add(cardColor(card.suit));
  
  const rank = RANKS[card.rank];
  const suit = SUITS[card.suit];
  const isFace = card.rank >= 10;
  const style = loadSettings().faceStyle || 'cool';
  
  div.innerHTML = `
    <div class="rank-suit-top">${rank}${suit}</div>
    <div class="center-suit">${isFace ? faceCardSVG(card.rank, cardColor(card.suit), style) : suit}</div>
    <div class="rank-suit-bottom">${rank}${suit}</div>
  `;
  
  return div;
}

function render() {
  if (foundations.every(f => f.length === 13)) {
    // Game already won — keep overlay up during re-renders
    document.getElementById('win-overlay').classList.add('show');
  }
  // Don't clear selectedCards here - preserve selection for highlight

  // Read responsive card dimensions from CSS
  const style = getComputedStyle(document.documentElement);
  const cardW = parseFloat(style.getPropertyValue('--card-width'));
  const cardH = parseFloat(style.getPropertyValue('--card-height'));
  const stackOffset = parseFloat(style.getPropertyValue('--stack-offset'));
  const fanOffset = parseFloat(style.getPropertyValue('--fan-offset'));
  
  // Stock
  const stockEl = document.getElementById('stock');
  stockEl.dataset.pileType = 'stock';
  stockEl.dataset.pileIndex = '0';
  stockEl.innerHTML = '<div class="empty-placeholder">&#9824;</div>';
  if (stock.length > 0) {
    const cardEl = createCardElement(stock[stock.length - 1], stock.length - 1);
    cardEl.style.position = 'relative';
    stockEl.appendChild(cardEl);
  }
  
  // Waste
  const wasteEl = document.getElementById('waste');
  wasteEl.dataset.pileType = 'waste';
  wasteEl.dataset.pileIndex = '0';
  wasteEl.innerHTML = '<div class="empty-placeholder"></div>';
  if (waste.length > 0) {
    const drawCount = loadSettings().drawCount || 1;
    const showCount = Math.min(drawCount, waste.length);
    for (let w = waste.length - showCount; w < waste.length; w++) {
      const cardEl = createCardElement(waste[w], w);
      cardEl.style.position = 'absolute';
      cardEl.style.left = ((w - (waste.length - showCount)) * fanOffset) + 'px';
      cardEl.style.zIndex = w;
      wasteEl.appendChild(cardEl);
    }
    wasteEl.style.minWidth = (cardW + (showCount - 1) * fanOffset) + 'px';
  }
  
  // Foundations
  SUITS.forEach((suit, i) => {
    const el = document.querySelector(`.foundation[data-suit="${i}"]`);
    el.dataset.pileType = 'foundation';
    el.dataset.pileIndex = i;
    const empty = el.querySelector('.empty-placeholder');
    empty.innerHTML = suit;
    // Remove old cards
    el.querySelectorAll('.card').forEach(c => c.remove());
    if (foundations[i].length > 0) {
      const top = foundations[i][foundations[i].length - 1];
      const cardEl = createCardElement(top, foundations[i].length - 1);
      cardEl.style.position = 'relative';
      el.appendChild(cardEl);
    }
  });
  
  // Tableau
  const tableauEl = document.getElementById('tableau');
  tableauEl.innerHTML = '';
  
  for (let t = 0; t < 7; t++) {
    const pileEl = document.createElement('div');
    pileEl.className = 'pile tableau-pile';
    pileEl.dataset.pileType = 'tableau';
    pileEl.dataset.pileIndex = t;
    
    if (tableau[t].length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-placeholder';
      empty.style.position = 'relative';
      empty.textContent = '';
      pileEl.appendChild(empty);
    } else {
      tableau[t].forEach((card, ci) => {
        const cardEl = createCardElement(card, ci);
        cardEl.style.top = (ci * stackOffset) + 'px';
        cardEl.style.zIndex = ci;
        if (flippedCards.some(fc => fc.t === t && fc.ci === ci)) {
          cardEl.classList.add('card-flip');
        }
        if (selectedCards && selectedCards.pile === 'tableau' && 
            selectedCards.index === t && ci >= selectedCards.cardIndex) {
          cardEl.classList.add('selected');
        }
        pileEl.appendChild(cardEl);
      });
      // Set min-height based on cards
      const h = cardH + (tableau[t].length - 1) * stackOffset;
      pileEl.style.minHeight = h + 'px';
    }
    
    tableauEl.appendChild(pileEl);
  }
  flippedCards = [];
  
  // Debug panel
  renderDebugPanel();
  
  // Style drag-over piles
  saveGame();
  
  // Check for stalemate
  checkStalemate();

  // Auto-complete button
  const acArea = document.getElementById('autocomplete-area');
  if (acArea) {
    if (!autoCompleting && canAutoComplete() && !foundations.every(f => f.length === 13)) {
      acArea.innerHTML = '<button class="btn autocomplete-btn" onclick="runAutoComplete()" style="background:rgba(255,215,0,0.2);color:#ffd700;animation:pulse-gold-btn 1.5s ease-in-out infinite">✨ Auto-Complete</button>';
    } else if (!autoCompleting) {
      acArea.innerHTML = '';
    }
  }
}

function showMessage(msg) {
  document.getElementById('message').textContent = msg;
  setTimeout(() => {
    document.getElementById('message').textContent = '';
  }, 1500);
}

function hasAnyValidMove() {
  // Check waste → foundation or tableau
  if (waste.length > 0) {
    const w = waste[waste.length - 1];
    for (let f = 0; f < 4; f++) {
      if (canPlaceOnFoundation(w, foundations[f])) return true;
    }
    for (let t = 0; t < 7; t++) {
      if (canPlaceOnTableau(w, tableau[t])) return true;
    }
  }
  // Check stock has cards or waste can recycle
  if (stock.length > 0) return true;
  if (waste.length > 0) return true; // can recycle
  
  // Check tableau → foundation or tableau → tableau
  for (let t = 0; t < 7; t++) {
    const pile = tableau[t];
    for (let ci = 0; ci < pile.length; ci++) {
      if (!pile[ci].faceUp) continue;
      // Only top card goes to foundation
      if (ci === pile.length - 1) {
        for (let f = 0; f < 4; f++) {
          if (canPlaceOnFoundation(pile[ci], foundations[f])) return true;
        }
      }
      // Any face-up card (with all cards above it) can move to another tableau
      // Check if all cards from ci onward are face-up
      let allUp = true;
      for (let k = ci; k < pile.length; k++) {
        if (!pile[k].faceUp) { allUp = false; break; }
      }
      if (!allUp) continue;
      for (let dt = 0; dt < 7; dt++) {
        if (dt === t) continue;
        if (canPlaceOnTableau(pile[ci], tableau[dt])) return true;
        // King on empty
        if (tableau[dt].length === 0 && pile[ci].rank === 12) return true;
      }
    }
  }
  return false;
}

function checkStalemate() {
  // Don't show stalemate if already won
  if (foundations.every(f => f.length === 13)) return;
  
  if (!hasAnyValidMove()) {
    document.getElementById('message').innerHTML = 
      '😔 No moves left — this deal is unwinnable. <button class="btn" onclick="newGame()" style="margin:0 0 0 10px;padding:6px 16px;font-size:13px">New Deal</button>';
  }
}

function canAutoComplete() {
  // All cards dealt and face-up, game is winnable by just moving to foundations
  if (stock.length > 0) return false;
  for (let t = 0; t < 7; t++) {
    for (const c of tableau[t]) {
      if (!c.faceUp) return false;
    }
  }
  return true;
}

let autoCompleting = false;

async function runAutoComplete() {
  if (autoCompleting) return;
  autoCompleting = true;
  document.getElementById('message').innerHTML = '';

  const FLY_MS = 200;  // flight duration
  const GAP_MS  = 80;  // pause between flights

  while (true) {
    if (foundations.every(f => f.length === 13)) break;

    let srcType = null, srcIdx = -1, destF = -1;

    // 1. Waste top → foundation
    if (waste.length > 0) {
      const w = waste[waste.length - 1];
      for (let f = 0; f < 4; f++) {
        if (canPlaceOnFoundation(w, foundations[f])) {
          srcType = 'waste'; srcIdx = 0; destF = f; break;
        }
      }
    }

    // 2. Tableau top → foundation
    if (!srcType) {
      for (let t = 0; t < 7; t++) {
        if (tableau[t].length === 0) continue;
        const top = tableau[t][tableau[t].length - 1];
        for (let f = 0; f < 4; f++) {
          if (canPlaceOnFoundation(top, foundations[f])) {
            srcType = 'tableau'; srcIdx = t; destF = f; break;
          }
        }
        if (srcType) break;
      }
    }

    if (!srcType) break; // nothing to move

    // --- Fly the card from source to foundation ---
    const srcEl = findCardElement(srcType, srcIdx);
    const destEl = document.querySelector(`.foundation[data-suit="${destF}"]`);
    if (srcEl && destEl) {
      await flyCard(srcEl, destEl, FLY_MS);
    }

    // Actually move the card in state
    if (srcType === 'waste') {
      foundations[destF].push(waste.pop());
    } else {
      foundations[destF].push(tableau[srcIdx].pop());
      flipTopTableau();
    }

    render();
    saveGame();
    playSound('foundation');
    spawnFoundationParticle(destF);
    await new Promise(r => setTimeout(r, GAP_MS));
  }

  autoCompleting = false;
  await new Promise(r => setTimeout(r, 500));
  checkWin();
}

// Find the DOM element for the top card of a pile
function findCardElement(pileType, idx) {
  if (pileType === 'waste') {
    const wasteEl = document.getElementById('waste');
    const cards = wasteEl.querySelectorAll('.card');
    return cards.length > 0 ? cards[cards.length - 1] : null;
  }
  if (pileType === 'tableau') {
    const pileEl = document.querySelector(`.tableau-pile[data-pile-index="${idx}"]`);
    if (!pileEl) return null;
    const cards = pileEl.querySelectorAll('.card');
    return cards.length > 0 ? cards[cards.length - 1] : null;
  }
  return null;
}

// Animate a card flying from srcEl to destEl
function flyCard(srcEl, destEl, durationMs) {
  return new Promise(resolve => {
    const srcRect = srcEl.getBoundingClientRect();
    const destRect = destEl.getBoundingClientRect();

    // Clone the card element
    const clone = srcEl.cloneNode(true);
    clone.classList.add('fly-card');
    clone.style.position = 'fixed';
    clone.style.left = srcRect.left + 'px';
    clone.style.top = srcRect.top + 'px';
    clone.style.width = srcRect.width + 'px';
    clone.style.height = srcRect.height + 'px';
    clone.style.margin = '0';
    clone.style.transition = `left ${durationMs}ms ease-out, top ${durationMs}ms ease-out, width ${durationMs}ms ease-out, height ${durationMs}ms ease-out`;
    clone.style.transform = 'scale(1.05)';
    clone.style.zIndex = '3000';
    document.body.appendChild(clone);

    // Force reflow so the browser registers the starting position,
    // then set the target position to trigger the CSS transition.
    clone.getBoundingClientRect();
    clone.style.left = destRect.left + 'px';
    clone.style.top = destRect.top + 'px';
    clone.style.width = destRect.width + 'px';
    clone.style.height = destRect.height + 'px';
    clone.style.transform = 'scale(1)';

    setTimeout(() => {
      clone.remove();
      resolve();
    }, durationMs + 20);
  });
}

function checkWin() {
  for (let f = 0; f < 4; f++) {
    if (foundations[f].length !== 13) return;
  }
  
  const stats = loadStats();
  stats.gamesWon++;
  stats.currentStreak++;
  if (stats.currentStreak > stats.bestStreak) {
    stats.bestStreak = stats.currentStreak;
  }
  saveStats(stats);
  updateStatsDisplay(stats);
  
  clearSavedGame();
  gameWon = true;
  document.getElementById('win-overlay').classList.add('show');
  spawnSparkles();
  playSound('win');
}

function spawnFoundationParticle(destF) {
  const el = document.querySelector(`.foundation[data-suit="${destF}"]`);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const particle = document.createElement('div');
  particle.style.cssText = `
    position: fixed; pointer-events: none; z-index: 1001;
    left: ${rect.left + rect.width/2}px; top: ${rect.top + rect.height/2}px;
    width: 6px; height: 6px; background: #ffd700; border-radius: 50%;
    transform: translate(-50%, -50%) scale(1); opacity: 0.9;
    transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  `;
  document.body.appendChild(particle);
  requestAnimationFrame(() => {
    particle.style.transform = 'translate(-50%, -50%) scale(4)';
    particle.style.opacity = '0';
  });
  setTimeout(() => particle.remove(), 450);
}

function spawnSparkles() {
  const symbols = ['✦', '✧', '◆', '⬥', '★', '💎', '✨', '⭐'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.top = -(Math.random() * 40 + 10) + 'px';
      el.style.fontSize = (Math.random() * 24 + 14) + 'px';
      el.style.color = ['#ffd700', '#ffec8b', '#fff8dc', '#ffb347', '#ffcc00'][Math.floor(Math.random() * 5)];
      el.style.animationDuration = (Math.random() * 3 + 2) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 60);
  }
}

// Click on tableau empty space to place selected cards via click-to-move
document.addEventListener('click', (e) => {
  if (!selectedCards || isDragging) return;
  
  // Ignore if we clicked on a card (those are handled by clickCard)
  if (e.target.closest('.card')) return;
  
  const pileEl = e.target.closest('.pile.tableau-pile');
  if (!pileEl) return;
  
  const targetIdx = parseInt(pileEl.dataset.pileIndex);
  if (selectedCards.pile !== 'tableau') return;
  
  const srcIdx = selectedCards.index;
  const cardIdx = selectedCards.cardIndex;
  
  if (srcIdx === targetIdx) {
    selectedCards = null;
    render();
    return;
  }
  
  const srcPile = tableau[srcIdx];
  const destPile = tableau[targetIdx];
  const cards = srcPile.slice(cardIdx);
  
  if (destPile.length === 0) {
    if (cards[0].rank === 12) { // King
      srcPile.splice(cardIdx);
      destPile.push(...cards);
      flipTopTableau();
      selectedCards = null;
      render();
      checkWin();
      playSound('place');
    } else {
      showMessage('Only a King can start an empty tableau pile');
      playSound('invalid');
    }
  } else {
    if (canPlaceOnTableau(cards[0], destPile)) {
      srcPile.splice(cardIdx);
      destPile.push(...cards);
      flipTopTableau();
      selectedCards = null;
      render();
      checkWin();
      playSound('place');
    } else {
      showMessage('Invalid move');
      playSound('invalid');
    }
  }
});

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function getSoundTheme() {
  const settings = loadSettings();
  return SOUND_THEMES[settings.soundTheme] || SOUND_THEMES.crystal;
}

function playSound(type) {
  const settings = loadSettings();
  if (!settings.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const th = getSoundTheme();
    switch (type) {
      case 'deal':   playDeal(ctx, th); break;
      case 'draw':   playClick(ctx, th, th.clickHi); break;
      case 'place':  playClick(ctx, th, th.clickLo); break;
      case 'foundation': playDing(ctx, th); break;
      case 'win':    playWin(ctx, th); break;
      case 'invalid': playBump(ctx, th); break;
      case 'autocomplete': playClick(ctx, th, th.clickHi); break;
    }
  } catch (e) { /* audio not available */ }
}

function tone(ctx, th, freq, startTime, duration, vol) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = th.wave;
  osc.frequency.value = freq;
  const t = ctx.currentTime + (startTime || 0);
  const d = duration || 0.12;
  gain.gain.setValueAtTime((vol || 0.12) * th.gain, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + d);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + d + 0.02);
}

function playClick(ctx, th, freq) {
  tone(ctx, th, freq, 0, th.clickDur, 0.12);
}

function playDing(ctx, th) {
  tone(ctx, th, th.dingLo, 0, th.dingDur, 0.14);
  tone(ctx, th, th.dingHi, 0.04, th.dingDur * 0.85, 0.09);
}

function playDeal(ctx, th) {
  th.deal.forEach((freq, i) => {
    tone(ctx, th, freq, i * th.dealGap, th.dealGap * 1.8, 0.09);
  });
}

function playBump(ctx, th) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = th.wave;
  osc.frequency.setValueAtTime(th.bump, ctx.currentTime);
  osc.frequency.setValueAtTime(th.bump * 0.65, ctx.currentTime + th.bumpDur * 0.5);
  gain.gain.setValueAtTime(0.10 * th.gain, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + th.bumpDur);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + th.bumpDur + 0.02);
}

function playWin(ctx, th) {
  th.win.forEach(({f, t}) => {
    tone(ctx, th, f, t, th.winDur, 0.14);
  });
}
